<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero -->
    <div class="container bg-white border border-white p-5 mt-5 text-center rounded">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKfHfYtZis-gpD09-XgVZkYql9R4sXoLhu4g&s" alt="logo">
        <h1>Login</h1>

        <!-- Username -->
        <div class="Username mb-3">
            <label for="field" class="form-label">Username</label>
            <input type="text" id="user" class="form-control" placeholder="John Doe" required>
        </div>

        <!-- Password -->
        <div class="password mb-3">
            <label for="field" class="form-label">Password</label>
            <input type="password" id="pass" class="form-control" placeholder="Must be more than 5" required>
        </div>
        <!-- Buttons -->
        <div class="button">
            <input class="form-check-input" type="checkbox" id="stay">
            <label for="staySigned">Stay Signed in</label>
            <p>You will remain logged in unless you disable this feature</p>

            <button class="btn btn-primary w-100" onclick="startLogin()">Login</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

    <script src="main.js"></script>
</html>
